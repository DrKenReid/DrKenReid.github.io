name: Refresh live data

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Scrobble count + recent track (Last.fm) and currently-reading
      # (Goodreads RSS) -> data/lastfm.json + data/now.json
      - name: Fetch live data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python .github/scripts/refresh_now.py

      - name: Commit if changed
        run: |
          FILES="data/lastfm.json data/now.json data/lastfm-history.json data/topalbums.json"
          if git diff --quiet $FILES; then
            echo "No change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "Refresh live data (Last.fm, Goodreads)"
          git push
