<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t;try{t=localStorage.getItem('kr-theme');}catch(e){}if(!t)t='dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="description" content="Every quote Ken Reid has saved while reading — 571 passages from 200+ books, searchable and ready to copy.">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Quote Wall - Ken Reid</title>
  <meta property="og:title" content="Quote Wall - Ken Reid">
  <meta property="og:description" content="Every quote Ken Reid has saved while reading — 571 passages from 200+ books, searchable and ready to copy.">
  <meta property="og:image" content="https://www.kenreid.co.uk/img/photography/hero/13.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:url" content="https://www.kenreid.co.uk/quotes.html">
  <meta property="og:type" content="website">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQK9NRXC9D"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PQK9NRXC9D');</script>
  <link rel="icon" href="./img/core-img/favicon.png">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="stylesheet" href="style.min.css">
  <link rel="canonical" href="https://www.kenreid.co.uk/quotes.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Quote Wall — Ken Reid",
    "url": "https://www.kenreid.co.uk/quotes.html",
    "about": "Book quotes",
    "author": {"@type": "Person", "name": "Ken Reid", "url": "https://www.kenreid.co.uk"}
  }
  </script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/palette.js"></script>
</head>
<body>
  <div id="preloader"><div class="loader"></div></div>

  <div id="header-section"></div>

  <main id="main-content">

  <section class="breadcrumb-area bg-img bg-overlay jarallax" style="background-image: url(img/photography/hero/13.webp); background-size: cover; background-position: center center;">
    <div class="container h-100"><div class="row h-100 align-items-center"><div class="col-12">
      <div class="breadcrumb-content text-center">
        <h1 class="page-title">Quote Wall</h1>
        <nav aria-label="breadcrumb"><ol class="breadcrumb justify-content-center">
          <li class="breadcrumb-item"><a href="./index.html"><i class="icon_house_alt"></i> Home</a></li>
          <li class="breadcrumb-item"><a href="./literature.html">Literature</a></li>
          <li class="breadcrumb-item active" aria-current="page">Quotes</li>
        </ol></nav>
      </div>
    </div></div></div>
  </section>

  <div class="about-us-area section-padding-80 clearfix">
    <div class="container">
      <div class="text-center" style="margin-bottom: 26px;">
        <span class="section-eyebrow">Marginalia</span>
        <h2>Every Quote I've Saved</h2>
        <p style="max-width: 560px; margin: 12px auto 0;"><span id="quote-count"></span> passages worth keeping, collected while reading. Click any card to copy it.</p>
      </div>
      <div class="text-center" style="margin-bottom: 30px;">
        <input type="search" id="quote-search" class="kr-quote-search" placeholder="Search quotes, authors, books…" aria-label="Search quotes">
      </div>
      <div id="quote-wall" class="kr-quote-wall"></div>
    </div>
  </div>

  </main>

  <hr>
  <div id="footer-section"></div>

  <script src="js/jquery.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/alime.bundle.js"></script>
  <script src="js/default-assets/active.js"></script>
  <script src="js/shared-components.js"></script>
  <script>
    renderHeader('header-section', { basePath: './', active: 'hobbies', hobbiesChild: 'literature' });
    renderFooter('footer-section');

    (function () {
      var wall = document.getElementById('quote-wall');
      var input = document.getElementById('quote-search');
      var countEl = document.getElementById('quote-count');
      if (!wall) return;
      var quotes = [];

      wall.innerHTML = new Array(9).fill('<div class="kr-quote-card kr-skeleton" style="height:140px;"></div>').join('');

      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function render(filter) {
        var q = (filter || '').trim().toLowerCase();
        var subset = q ? quotes.filter(function (x) {
          return (x.q + ' ' + x.a + ' ' + x.b).toLowerCase().indexOf(q) !== -1;
        }) : quotes;
        wall.innerHTML = subset.map(function (x, i) {
          var idx = quotes.indexOf(x);
          return '<div class="kr-quote-card" id="q-' + idx + '" data-i="' + idx + '" tabindex="0" role="button" aria-label="Copy quote">' +
            '<a class="kr-quote-link" href="#q-' + idx + '" aria-label="Copy link to this quote" title="Copy link to this quote">#</a>' +
            '<p>' + esc(x.q) + '</p>' +
            '<footer>&mdash; ' + esc(x.a) + (x.b ? ', <em>' + esc(x.b) + '</em>' : '') + '</footer>' +
            '<span class="kr-quote-copied" aria-hidden="true">Copied</span>' +
            '</div>';
        }).join('') || '<p class="text-center" style="grid-column: 1/-1;">Nothing matches.</p>';
        if (countEl) countEl.textContent = q ? subset.length + ' of ' + quotes.length : String(quotes.length);
      }

      function copyCard(card) {
        var x = quotes[parseInt(card.getAttribute('data-i'), 10)];
        if (!x) return;
        var text = '“' + x.q + '” — ' + x.a + (x.b ? ', ' + x.b : '');
        function done() {
          card.classList.add('is-copied');
          setTimeout(function () { card.classList.remove('is-copied'); }, 1400);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopyText(text, done); });
        } else {
          fallbackCopyText(text, done);
        }
      }

      wall.addEventListener('click', function (e) {
        var link = e.target.closest && e.target.closest('.kr-quote-link');
        if (link) {
          e.preventDefault();
          e.stopPropagation();
          var url = location.origin + location.pathname + link.getAttribute('href');
          var card = link.closest('.kr-quote-card');
          history.replaceState(null, '', link.getAttribute('href'));
          function done() {
            card.classList.add('is-copied');
            setTimeout(function () { card.classList.remove('is-copied'); }, 1400);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done).catch(function () { fallbackCopyText(url, done); });
          } else {
            fallbackCopyText(url, done);
          }
          return;
        }
        var card2 = e.target.closest && e.target.closest('.kr-quote-card');
        if (card2) copyCard(card2);
      });
      wall.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        var card = e.target.closest && e.target.closest('.kr-quote-card');
        if (card) { e.preventDefault(); copyCard(card); }
      });

      var debounce = null;
      if (input) {
        input.addEventListener('input', function () {
          clearTimeout(debounce);
          debounce = setTimeout(function () { render(input.value); }, 120);
        });
      }

      fetch('data/quotes-all.json').then(function (r) { return r.json(); }).then(function (data) {
        quotes = data || [];
        render('');
        // Permalink: scroll to and highlight #q-N
        if (/^#q-\d+$/.test(location.hash)) {
          var target = document.getElementById(location.hash.slice(1));
          if (target) {
            target.scrollIntoView({ block: 'center' });
            target.classList.add('is-target');
            setTimeout(function () { target.classList.remove('is-target'); }, 2600);
          }
        }
      }).catch(function () { wall.innerHTML = ''; });
    }());
  </script>
</body>
</html>
