<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t;try{t=localStorage.getItem('kr-theme');}catch(e){}if(!t)t='dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="description" content="An interactive map of where Ken Reid's photographs were taken — Scotland, Michigan, and everywhere in between.">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Photo Map - Ken Reid</title>
  <meta property="og:title" content="Photo Map - Ken Reid">
  <meta property="og:description" content="An interactive map of where Ken Reid's photographs were taken — Scotland, Michigan, and everywhere in between.">
  <meta property="og:image" content="https://www.kenreid.co.uk/img/photography/hero/1.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:url" content="https://www.kenreid.co.uk/map.html">
  <meta property="og:type" content="website">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQK9NRXC9D"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PQK9NRXC9D');</script>
  <link rel="icon" href="./img/core-img/favicon.png">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.min.css">
  <link rel="stylesheet" href="js/vendor/leaflet/leaflet.css">
  <link rel="canonical" href="https://www.kenreid.co.uk/map.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Photo Map — Ken Reid",
    "url": "https://www.kenreid.co.uk/map.html",
    "about": "Photography locations",
    "author": {"@type": "Person", "name": "Ken Reid", "url": "https://www.kenreid.co.uk"}
  }
  </script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/palette.js"></script>
  <style>
    #photo-map {
      height: 72vh;
      min-height: 420px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      z-index: 1;
    }
    [data-theme="dark"] #photo-map {
      border-color: rgba(255, 255, 255, 0.09);
    }
    .kr-map-marker {
      background: #fc6060;
      color: #ffffff;
      border: 2px solid #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      font-family: "Poppins", sans-serif;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }
    .kr-map-popup .kr-map-region {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .kr-map-popup .kr-map-grid {
      display: grid;
      grid-template-columns: repeat(3, 86px);
      gap: 6px;
    }
    .kr-map-popup .kr-map-grid a {
      display: block;
      border-radius: 6px;
      overflow: hidden;
    }
    .kr-map-popup .kr-map-grid img {
      width: 86px;
      height: 64px;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }
    .kr-map-popup .kr-map-grid a:hover img {
      transform: scale(1.06);
    }
    [data-theme="dark"] .leaflet-popup-content-wrapper,
    [data-theme="dark"] .leaflet-popup-tip {
      background: #242424;
      color: #e2e2e2;
    }
    [data-theme="dark"] .leaflet-bar a {
      background: #242424;
      color: #e2e2e2;
      border-bottom-color: #3a3a3a;
    }
  </style>
</head>
<body>
  <div id="preloader"><div class="loader"></div></div>

  <div id="header-section"></div>

  <main id="main-content">

  <section class="breadcrumb-area bg-img bg-overlay jarallax" style="background-image: url(img/photography/hero/100.webp); background-size: cover; background-position: center center;">
    <div class="container h-100"><div class="row h-100 align-items-center"><div class="col-12">
      <div class="breadcrumb-content text-center">
        <h1 class="page-title">Photo Map</h1>
        <nav aria-label="breadcrumb"><ol class="breadcrumb justify-content-center">
          <li class="breadcrumb-item"><a href="./index.html"><i class="icon_house_alt"></i> Home</a></li>
          <li class="breadcrumb-item"><a href="./gallery.html">Photography</a></li>
          <li class="breadcrumb-item active" aria-current="page">Map</li>
        </ol></nav>
      </div>
    </div></div></div>
  </section>

  <div class="about-us-area section-padding-80 clearfix">
    <div class="container">
      <div class="text-center" style="margin-bottom: 28px;">
        <span class="section-eyebrow">Where</span>
        <h2>Photographs by Place</h2>
        <p style="max-width: 560px; margin: 12px auto 0;">Click a marker to see photos taken there. This map grows as I geotag the archive — <a href="./gallery.html">the full gallery</a> has everything regardless of place.</p>
      </div>
      <div id="photo-map" aria-label="Map of photograph locations"></div>
    </div>
  </div>

  </main>

  <hr>
  <div id="footer-section"></div>

  <script src="js/jquery.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/alime.bundle.js"></script>
  <script src="js/default-assets/active.js"></script>
  <script src="js/shared-components.js"></script>
  <script src="js/vendor/leaflet/leaflet.js"></script>
  <script>
    renderHeader('header-section', { basePath: './', active: 'hobbies', hobbiesChild: 'gallery' });
    renderFooter('footer-section');

    (function () {
      var TILES = {
        light: {
          url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        },
        dark: {
          url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }
      };
      var RELEASE = 'https://github.com/DrKenReid/DrKenReid.github.io/releases/download/photos-v1/';

      var map = L.map('photo-map', { scrollWheelZoom: true }).setView([50, -30], 3);
      var currentTiles = null;

      function applyTiles() {
        var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        if (currentTiles) map.removeLayer(currentTiles);
        currentTiles = L.tileLayer(TILES[theme].url, {
          attribution: TILES[theme].attribution,
          maxZoom: 18
        }).addTo(map);
      }
      applyTiles();
      document.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('#theme-toggle')) {
          setTimeout(applyTiles, 60);
        }
      });

      var regionsByName = {};

      // Popup thumbs open the site lightbox as a gallery of the whole
      // region (falls back to the plain link when jQuery/magnific are
      // unavailable).
      function openRegionLightbox(regionName, startStem) {
        var region = regionsByName[regionName];
        if (!region || typeof jQuery === 'undefined' || !jQuery.fn.magnificPopup) return false;
        var items = region.photos.map(function (stem) {
          return {
            src: RELEASE + stem + '.png',
            title: region.name + ' <span class="kr-lightbox-num">#' + stem + '</span>'
          };
        });
        var index = Math.max(0, region.photos.indexOf(startStem));
        jQuery.magnificPopup.open({
          items: items,
          type: 'image',
          mainClass: 'kr-lightbox mfp-fade',
          closeOnContentClick: false,
          image: {
            titleSrc: function (item) { return item.data.title; }
          },
          gallery: { enabled: true, preload: [0, 2], navigateByImgClick: true, tPrev: 'Previous', tNext: 'Next' }
        }, index);
        return true;
      }

      document.addEventListener('click', function (e) {
        var a = e.target.closest && e.target.closest('.kr-map-grid a, a.kr-map-more');
        if (!a) return;
        var popup = a.closest('.kr-map-popup');
        if (!popup) return;
        if (openRegionLightbox(popup.getAttribute('data-region'), a.getAttribute('data-stem'))) {
          e.preventDefault();
        }
      });

      fetch('data/photo-locations.json').then(function (r) { return r.json(); }).then(function (data) {
        var regions = (data.regions || []).filter(function (r) { return r.photos && r.photos.length; });
        if (!regions.length) return;
        var bounds = [];
        regions.forEach(function (region) {
          regionsByName[region.name] = region;
          bounds.push([region.lat, region.lng]);
          var size = Math.max(34, Math.min(52, 30 + region.photos.length));
          var marker = L.marker([region.lat, region.lng], {
            icon: L.divIcon({
              className: '',
              html: '<div class="kr-map-marker" style="width:' + size + 'px;height:' + size + 'px;">' + region.photos.length + '</div>',
              iconSize: [size, size],
              iconAnchor: [size / 2, size / 2]
            }),
            title: region.name
          }).addTo(map);

          var shown = region.photos.slice(0, 9);
          var html = '<div class="kr-map-popup" data-region="' + region.name + '">' +
              '<div class="kr-map-region">' + region.name +
              ' · ' + region.photos.length + ' photo' + (region.photos.length === 1 ? '' : 's') + '</div>' +
              '<div class="kr-map-grid">' +
              shown.map(function (stem) {
                  return '<a href="' + RELEASE + stem + '.png" data-stem="' + stem + '" target="_blank" rel="noopener noreferrer">' +
                      '<img src="img/photography/thumb/' + stem + '.webp" alt="Photo ' + stem + ' taken in ' + region.name + '" loading="lazy"></a>';
              }).join('') +
              '</div>' +
              (region.photos.length > 9
                  ? '<a href="#" class="kr-map-more" data-stem="' + region.photos[9] + '" style="display:inline-block;margin-top:6px;font-size:12px;">View all ' + region.photos.length + ' &rarr;</a>'
                  : '') +
              '</div>';
          marker.bindPopup(html, { minWidth: 290 });
        });
        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 6 });
      }).catch(function () {});
    }());
  </script>
</body>
</html>
