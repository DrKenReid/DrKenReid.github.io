  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

</head>
<body>
  <div id="preloader"><div class="loader"></div></div>

  <div id="header-section"></div>

  <main id="main-content">

  <section class="breadcrumb-area bg-img bg-overlay jarallax" style="background-image: url(/img/photography/hero/15.webp);">
    <div class="container h-100"><div class="row h-100 align-items-center"><div class="col-12">
      <div class="breadcrumb-content text-center">
        <h1 class="page-title">404</h1>
      </div>
    </div></div></div>
  </section>

  <div class="about-us-area section-padding-80 clearfix">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8 text-center">
          <h2>Page Not Found</h2>
          <p style="color: #636363; font-size: 16px; line-height: 1.8; margin: 20px 0 30px;">The page you're looking for doesn't exist, was moved, or I broke something. <a href="/contact.html">Please let me know!</a></p>
          <a href="/index.html" class="btn alime-btn btn-2">Back to Home</a>

          <figure style="margin: 48px auto 0; max-width: 640px;">
            <img id="lost-photo" alt="" style="display: none; width: 100%; border-radius: 12px;">
            <figcaption id="lost-photo-caption" style="display: none; margin-top: 10px; font-size: 0.9rem; opacity: 0.85;">
              Since you're lost anyway, here's a random photo I took. <a href="/gallery.html">There are 490+ more.</a>
            </figcaption>
          </figure>
          <script>
            fetch('/data/photography-standard-files.json').then(function(r) { return r.json(); }).then(function(files) {
              if (!Array.isArray(files) || !files.length) return;
              var pick = files[Math.floor(Math.random() * files.length)];
              var img = document.getElementById('lost-photo');
              img.src = '/img/photography/thumb/' + pick.replace(/\.(png|jpg|JPG|jpeg)$/, '.webp');
              img.alt = 'A random photograph from the gallery';
              img.onload = function() {
                img.style.display = 'block';
                document.getElementById('lost-photo-caption').style.display = 'block';
              };
            }).catch(function() {});
          </script>
        </div>
      </div>
    </div>
  </div>

  </main>
  <div id="footer-section"></div>

  <script src="/js/jquery.min.js"></script>
  <script src="/js/popper.min.js"></script>

  <script>renderHeader('header-section', { basePath: '/', active: 'home' });
renderFooter('footer-section');</script>
</body>
</html>
